<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PR MedMap — Puerto Rico Medical Specialties Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#06112E;--cobalt:#185FA5;--mid:#4d9ed9;
      --pale:#B5D4F4;--frost:#E6F1FB;--ink:#0a2540;
      --muted:#5a7a96;--border:#c0cfe0;--bg:#f4f8fc;
    }
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden}
    /* Page switching — use both display and pointer-events to ensure no bleed-through */
    #homepage{position:relative;z-index:1}
    #specialty-page{position:relative;z-index:0}

    /* ══════════════════════════════════════════
       LANGUAGE PICKER SPLASH
    ══════════════════════════════════════════ */
    #lang-splash{
      position:fixed;inset:0;z-index:9999;
      background:var(--navy);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:0;
      transition:opacity .5s ease, visibility .5s ease;
    }
    #lang-splash.hidden{opacity:0;visibility:hidden;pointer-events:none}

    .splash-logo{
      display:flex;align-items:center;gap:14px;margin-bottom:2.8rem;
    }
    .splash-logo-mark{
      width:52px;height:52px;background:var(--cobalt);border-radius:12px;
      display:flex;align-items:center;justify-content:center;
    }
    .splash-logo-mark svg{width:30px;height:30px;fill:#fff}
    .splash-logo-text{
      font-family:'DM Serif Display',serif;font-size:1.7rem;color:#fff;line-height:1.1;
    }
    .splash-logo-text small{
      display:block;font-family:'DM Sans',sans-serif;font-size:11px;
      color:var(--pale);font-weight:400;letter-spacing:.06em;margin-top:3px;
    }

    .splash-divider{
      width:48px;height:1px;background:rgba(255,255,255,.15);margin:0 auto 2.8rem;
    }

    .splash-prompt{
      font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
      color:var(--pale);margin-bottom:1.4rem;text-align:center;
    }

    .lang-options{
      display:flex;gap:16px;
    }

    .lang-btn{
      display:flex;flex-direction:column;align-items:center;gap:10px;
      background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.15);
      border-radius:16px;padding:1.8rem 2.4rem;cursor:pointer;
      transition:all .2s ease;min-width:160px;
      font-family:'DM Sans',sans-serif;
    }
    .lang-btn:hover{
      background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.35);
      transform:translateY(-3px);
    }
    .lang-flag{font-size:2.4rem;line-height:1}
    .lang-name{
      font-family:'DM Serif Display',serif;font-size:1.35rem;color:#fff;
    }
    .lang-native{font-size:11px;color:var(--pale);font-weight:400;letter-spacing:.04em}

    /* ══════════════════════════════════════════
       LANG TOGGLE IN NAV
    ══════════════════════════════════════════ */
    .lang-toggle{
      display:flex;align-items:center;gap:4px;
      background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
      border-radius:20px;padding:3px 4px;flex-shrink:0;
    }
    .lang-toggle-btn{
      font-size:11px;font-weight:600;color:var(--pale);
      background:none;border:none;cursor:pointer;padding:3px 8px;
      border-radius:14px;transition:all .15s;font-family:'DM Sans',sans-serif;
      letter-spacing:.04em;
    }
    .lang-toggle-btn.active{background:#fff;color:var(--navy);}
    .lang-toggle-btn:not(.active):hover{color:#fff}

    /* ══════════════════════════════════════════
       NAV
    ══════════════════════════════════════════ */
    .site-nav{background:var(--navy);padding:.85rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;position:sticky;top:0;z-index:400}
    .nav-left{display:flex;align-items:center;gap:1.2rem;min-width:0}
    .nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0}
    .nav-logo-mark{width:32px;height:32px;background:var(--cobalt);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .nav-logo-mark svg{width:18px;height:18px;fill:#fff}
    .nav-logo-text{font-family:'DM Serif Display',serif;font-size:1rem;color:#fff;line-height:1.1}
    .nav-logo-text small{display:block;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--pale);font-weight:400;letter-spacing:.05em;margin-top:1px}
    .nav-breadcrumb{display:none;align-items:center;gap:8px;font-size:12.5px;color:var(--pale)}
    .nav-breadcrumb .crumb-home{cursor:pointer;transition:color .15s}.nav-breadcrumb .crumb-home:hover{color:#fff}
    .nav-breadcrumb .sep{opacity:.4}.nav-breadcrumb .crumb-active{color:#fff;font-weight:500}
    .nav-right{display:flex;align-items:center;gap:10px}
    .nav-back-btn{display:none;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:7px;color:#fff;font-family:'DM Sans',sans-serif;font-size:12.5px;padding:6px 14px;cursor:pointer;transition:background .15s}
    .nav-back-btn:hover{background:rgba(255,255,255,.18)}

    /* ══════════════════════════════════════════
       HOME HERO
    ══════════════════════════════════════════ */
    .home-hero{background:var(--navy);color:#fff;padding:3.5rem 2rem 3rem;text-align:center;border-top:1px solid rgba(255,255,255,.07)}
    .home-hero h1{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,4.5vw,3rem);font-weight:400;line-height:1.12;margin-bottom:.9rem}
    .home-hero h1 em{font-style:italic;color:var(--pale)}
    .home-hero p{font-size:14.5px;color:var(--pale);max-width:520px;margin:0 auto;line-height:1.65}
    .home-stats-bar{display:flex;justify-content:center;background:#0d1f3c;border-top:1px solid rgba(255,255,255,.08);flex-wrap:wrap}
    .home-stat{padding:1rem 2.2rem;text-align:center;border-right:1px solid rgba(255,255,255,.08)}
    .home-stat:last-child{border-right:none}
    .home-stat-val{font-family:'DM Serif Display',serif;font-size:1.5rem;color:#fff;line-height:1}
    .home-stat-lbl{font-size:10.5px;color:var(--pale);margin-top:4px;letter-spacing:.05em}

    /* ══════════════════════════════════════════
       SPECIALTY GRID
    ══════════════════════════════════════════ */
    .home-body{max-width:1160px;margin:0 auto;padding:2.5rem 2rem 4rem}
    .home-section-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:1.1rem;display:block}
    .specialty-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
    .spec-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:1.15rem 1.1rem 1rem;cursor:pointer;transition:border-color .2s,transform .18s,box-shadow .2s;position:relative;overflow:hidden;text-align:left}
    .spec-card.available:hover{border-color:var(--cobalt);transform:translateY(-2px);box-shadow:0 8px 24px rgba(6,17,46,.1)}
    .spec-card.coming-soon{opacity:.55;cursor:default}
    .spec-card.coming-soon:hover{transform:none;box-shadow:none;border-color:var(--border)}
    .spec-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1rem;margin-bottom:.7rem}
    .spec-card.available .spec-icon{background:var(--frost)}
    .spec-card.coming-soon .spec-icon{background:#eef1f5}
    .spec-name{font-size:12.5px;font-weight:600;color:var(--ink);margin-bottom:2px;line-height:1.25}
    .spec-card.coming-soon .spec-name{color:var(--muted)}
    .spec-sub-count{font-size:10px;color:var(--muted);margin-bottom:3px}
    .spec-status{font-size:10px;font-weight:500}
    .status-live{color:var(--cobalt)}.status-soon{color:var(--muted)}
    .spec-arrow{position:absolute;top:1rem;right:1rem;font-size:14px;color:var(--cobalt);opacity:0;transition:opacity .15s}
    .spec-card.available:hover .spec-arrow{opacity:1}

    /* ══════════════════════════════════════════
       SPECIALTY PAGE HEADER
    ══════════════════════════════════════════ */
    .spec-page-header{background:var(--navy);color:#fff;padding:1.8rem 2rem 1.6rem;text-align:center;border-top:1px solid rgba(255,255,255,.07)}
    .spec-page-header h1{font-family:'DM Serif Display',serif;font-size:clamp(1.4rem,3.5vw,2.2rem);font-weight:400;line-height:1.15;margin-bottom:.5rem}
    .spec-page-header p{font-size:13px;color:var(--pale);max-width:560px;margin:0 auto;line-height:1.6}
    .stats-bar{display:flex;justify-content:center;background:#0d1f3c;border-top:1px solid rgba(255,255,255,.08);flex-wrap:wrap}
    .stat{padding:1rem 2.5rem;text-align:center;border-right:1px solid rgba(255,255,255,.08)}
    .stat:last-child{border-right:none}
    .stat-value{font-family:'DM Serif Display',serif;font-size:1.6rem;color:#fff;line-height:1}
    .stat-label{font-size:11px;color:var(--pale);margin-top:4px;letter-spacing:.05em}

    /* ══════════════════════════════════════════
       SUBSPECIALTY FILTER BAR
    ══════════════════════════════════════════ */
    .sub-filter-bar{background:#fff;border-bottom:1px solid var(--border);padding:.85rem 1.5rem;display:flex;align-items:flex-start;gap:.6rem;flex-wrap:wrap;position:relative;z-index:1}
    .sub-filter-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:.4rem .2rem;flex-shrink:0;align-self:center}
    .sub-chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'DM Sans',sans-serif}
    .sub-chip:hover{border-color:var(--cobalt);color:var(--cobalt)}
    .sub-chip.active{background:var(--cobalt);border-color:var(--cobalt);color:#fff}
    .sub-chip.all-chip.active{background:var(--navy);border-color:var(--navy);color:#fff}
    .sub-chip .chip-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
    .sub-chip.shared-sub{border-style:dashed}
    .sub-chip.shared-sub.active{border-style:solid}
    .shared-badge{font-size:9px;background:rgba(255,255,255,.25);border-radius:8px;padding:1px 5px;margin-left:2px}
    .shared-note{font-size:11px;color:var(--muted);padding:.5rem 1.5rem .75rem;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
    .shared-note-dash{width:18px;height:0;border-top:2px dashed var(--muted);flex-shrink:0}

    /* ══════════════════════════════════════════
       MAP
    ══════════════════════════════════════════ */
    .layout{display:flex}
    main{flex:1;padding:2rem 1.5rem 3rem;min-width:0;transition:margin-right .35s ease}
    main.sidebar-open{margin-right:360px}
    .map-card{background:#fff;border-radius:12px;border:1px solid var(--border);box-shadow:0 2px 12px rgba(6,17,46,.07)}
    .map-header{padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
    .map-header h2{font-family:'DM Serif Display',serif;font-size:1.1rem;font-weight:400}
    .map-hint{font-size:12px;color:var(--muted)}
    .map-body{padding:0;overflow-x:hidden}
    #pr-map{display:none;width:100%;min-height:80vh}
    #loading{text-align:center;padding:4rem;color:var(--muted);font-size:14px}
    .legend-wrap{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;align-items:center;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--muted)}
    .legend-label{font-weight:600;color:var(--ink);margin-right:4px}
    .legend-item{display:inline-flex;align-items:center;gap:5px}
    .legend-swatch{width:16px;height:16px;border-radius:4px;border:1px solid rgba(0,0,0,.12);display:inline-block;flex-shrink:0}

    /* ══════════════════════════════════════════
       TOOLTIP
    ══════════════════════════════════════════ */
    #tooltip{display:none;position:fixed;background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;pointer-events:none;z-index:500;min-width:190px;box-shadow:0 6px 24px rgba(6,17,46,.14)}
    .tt-name{font-weight:700;font-size:14px;color:var(--ink);padding-bottom:7px;margin-bottom:7px;border-bottom:1px solid var(--frost)}
    .tt-grid{display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:12.5px}
    .tt-key{color:var(--muted)}.tt-val{color:var(--ink);font-weight:600;text-align:right}
    .tt-hint{margin-top:8px;font-size:11px;color:var(--muted);text-align:center;border-top:1px solid var(--frost);padding-top:7px}

    /* ══════════════════════════════════════════
       SIDEBAR
    ══════════════════════════════════════════ */
    #sidebar{position:fixed;top:var(--nav-h,62px);right:-380px;width:360px;height:calc(100vh - var(--nav-h,62px));background:#fff;border-left:1px solid var(--border);box-shadow:-4px 0 24px rgba(6,17,46,.12);z-index:300;display:flex;flex-direction:column;transition:right .35s cubic-bezier(.4,0,.2,1);overflow:hidden}
    #sidebar.open{right:0}
    .sb-header{background:var(--navy);color:#fff;padding:1.2rem 1.2rem 1rem;display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
    .sb-title{font-family:'DM Serif Display',serif;font-size:1.2rem;font-weight:400}
    .sb-subtitle{font-size:12px;color:var(--pale);margin-top:3px}
    .sb-close{background:none;border:none;color:rgba(255,255,255,.7);font-size:24px;cursor:pointer;line-height:1;padding:0 2px;transition:color .15s}
    .sb-close:hover{color:#fff}
    .sb-body{flex:1;overflow-y:auto}
    .doc-list{list-style:none}
    .doc-item{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--frost);cursor:pointer;transition:background .15s}
    .doc-item:hover{background:var(--frost)}
    .doc-item:last-child{border-bottom:none}
    .doc-name{font-size:13.5px;font-weight:500;color:var(--ink);flex:1}
    .doc-multi{font-size:10px;background:var(--frost);color:#1A6098;border:1px solid var(--pale);border-radius:10px;padding:2px 7px;white-space:nowrap;flex-shrink:0}
    .doc-arrow{color:var(--muted);font-size:16px;flex-shrink:0}

    /* ══════════════════════════════════════════
       PROFILE PANEL
    ══════════════════════════════════════════ */
    #profile-panel{position:absolute;top:0;left:0;width:100%;height:100%;background:#fff;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;z-index:10}
    #profile-panel.open{transform:translateX(0)}
    .prof-header{background:var(--navy);color:#fff;padding:1rem 1.2rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .prof-back{background:none;border:none;color:rgba(255,255,255,.8);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:5px;padding:0;transition:color .15s;font-family:'DM Sans',sans-serif}
    .prof-back:hover{color:#fff}
    .prof-close{background:none;border:none;color:rgba(255,255,255,.7);font-size:24px;cursor:pointer;line-height:1;padding:0 2px;transition:color .15s}
    .prof-close:hover{color:#fff}
    .prof-body{flex:1;overflow-y:auto;padding:1.5rem 1.2rem}
    .prof-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--cobalt),var(--mid));display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:1.5rem;color:#fff;margin-bottom:1rem}
    .prof-name{font-family:'DM Serif Display',serif;font-size:1.25rem;font-weight:400;color:var(--ink);line-height:1.2;margin-bottom:4px}
    .prof-tag{font-size:12px;color:var(--muted);margin-bottom:1.2rem}
    .prof-section-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;margin-top:1.2rem}
    .prof-munis{display:flex;flex-wrap:wrap;gap:6px}
    .prof-muni-tag{font-size:12px;background:var(--frost);color:var(--cobalt);border:1px solid var(--pale);border-radius:12px;padding:3px 10px}
    .prof-muni-tag.current{background:var(--cobalt);color:#fff;border-color:var(--cobalt)}
    .prof-office-note{font-size:11.5px;color:var(--muted);margin-top:6px;font-style:italic}
    .prof-links{display:flex;flex-direction:column;gap:8px;margin-top:.5rem}
    .prof-link{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--frost);border:1px solid var(--pale);border-radius:8px;text-decoration:none;color:var(--ink);transition:background .15s,border-color .15s}
    .prof-link:hover{background:var(--pale);border-color:#85B7EB}
    .prof-link-icon{font-size:18px;flex-shrink:0}
    .prof-link-text{flex:1;overflow:hidden}
    .prof-link-label{font-size:10px;color:var(--muted);display:block}
    .prof-link-val{font-size:12.5px;color:var(--cobalt);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
    .prof-no-links{font-size:13px;color:var(--muted);padding:1rem 0}
    .prof-ext{color:var(--muted);font-size:12px;flex-shrink:0}

    footer{text-align:center;padding:1.5rem;font-size:12px;color:var(--muted);border-top:1px solid var(--border);background:#fff;margin-top:2rem}

    /* ── No-municipality disclaimer asterisk ── */
    .no-muni-bar{
      display:flex;align-items:center;justify-content:center;
      padding:.55rem 1.5rem;background:#fff;border-top:1px solid var(--border);
      gap:6px;
    }
    .no-muni-btn{
      display:inline-flex;align-items:center;gap:6px;
      background:none;border:none;cursor:pointer;
      font-family:'DM Sans',sans-serif;font-size:11.5px;
      color:var(--cobalt);text-decoration:underline;text-underline-offset:2px;
      padding:4px 8px;border-radius:6px;transition:background .15s;
    }
    .no-muni-btn:hover{background:var(--frost);}
    .no-muni-asterisk{font-size:13px;color:var(--cobalt);font-weight:700;}
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════════
     LANGUAGE PICKER SPLASH
══════════════════════════════════════════════ -->
<div id="lang-splash">
  <div class="splash-logo">
    <div class="splash-logo-mark">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
    </div>
    <div class="splash-logo-text">
      PR MedMap
      <small>Puerto Rico Medical Specialties Portal</small>
    </div>
  </div>

  <div class="splash-divider"></div>

  <p class="splash-prompt">Select your language · Selecciona tu idioma</p>

  <div class="lang-options">
    <button class="lang-btn" onclick="setLang('en')">
      <span class="lang-flag">🇺🇸</span>
      <span class="lang-name">English</span>
      <span class="lang-native">Continue in English</span>
    </button>
    <button class="lang-btn" onclick="setLang('es')">
      <span class="lang-flag">🇵🇷</span>
      <span class="lang-name">Español</span>
      <span class="lang-native">Continuar en Español</span>
    </button>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     MAIN APP
══════════════════════════════════════════════ -->
<nav class="site-nav">
  <div class="nav-left">
    <div class="nav-logo" onclick="goHome()">
      <div class="nav-logo-mark">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
      </div>
      <div class="nav-logo-text">PR MedMap<small id="nav-tagline"></small></div>
    </div>
    <div class="nav-breadcrumb" id="nav-breadcrumb">
      <span class="crumb-home" onclick="goHome()" id="nav-crumb-home"></span>
      <span class="sep">›</span>
      <span class="crumb-active" id="nav-crumb-label"></span>
    </div>
  </div>
  <div class="nav-right">
    <button class="nav-back-btn" id="nav-back-btn" onclick="goHome()"></button>
    <div class="lang-toggle">
      <button class="lang-toggle-btn" id="lt-en" onclick="setLang('en')">EN</button>
      <button class="lang-toggle-btn" id="lt-es" onclick="setLang('es')">ES</button>
    </div>
  </div>
</nav>

<!-- HOME -->
<div id="homepage">
  <div class="home-hero">
    <h1 id="hero-h1"></h1>
    <p id="hero-p"></p>
  </div>
  <div class="home-stats-bar">

function setLang(lang) {
  LANG = lang;
  document.documentElement.lang = lang;

  // hide splash
  document.getElementById('lang-splash').classList.add('hidden');

  // toggle button states
  document.getElementById('lt-en').classList.toggle('active', lang==='en');
  document.getElementById('lt-es').classList.toggle('active', lang==='es');

  // update all static strings
  applyStaticStrings();

  // re-render dynamic content if specialty is open
  if (currentSP) {
    openSpecialty(currentSP.id, true);
  } else {
    rebuildGrid();
  }
}

// ════════════════════════════════════════════════════════════════
function rebuildGrid() {
  const grid = document.getElementById('specialty-grid');
  grid.innerHTML = '';
  SPECIALTIES.forEach(sp => {
    const subCount = sp.subs ? sp.subs.length : 0;
    const nameStr = typeof sp.name === 'object' ? (sp.name[LANG]||sp.name.en) : sp.name;
    const card = document.createElement('div');
    card.className = 'spec-card '+(sp.available?'available':'coming-soon');
    // Use data attribute — onclick closure can lose scope after grid rebuilds
    if (sp.available) {
      card.dataset.spId = sp.id;
      card.setAttribute('onclick', 'handleCardClick(event)');
    }
    card.innerHTML =
      '<div class="spec-icon">'+sp.icon+'</div>'+
      '<div class="spec-name">'+nameStr+'</div>'+
      (subCount>1?'<div class="spec-sub-count">'+subCount+' '+t('subCountSuffix')+'</div>':'')+
      '<div class="spec-status '+(sp.available?'status-live':'status-soon')+'">'+
        (sp.available?t('statusLive'):t('statusSoon'))+
      '</div>'+
      (sp.available?'<span class="spec-arrow">›</span>':'');
    grid.appendChild(card);
  });
}

// Separate click handler using data attribute — survives grid rebuilds and goHome cycles
function handleCardClick(event) {
  const card = event.currentTarget;
  const id = card.dataset.spId;
  if (id) openSpecialty(id);
}

let currentSP = null;
let currentSubFilter = '__all__';
let mapLoaded = false;
let mapPathsSel = null;

function showPage(which) {
  // Single source of truth for page switching
  const hp = document.getElementById('homepage');
  const sp = document.getElementById('specialty-page');
  if (which === 'home') {
    sp.style.display = 'none';
    hp.style.display = 'block';
  } else {
    hp.style.display = 'none';
    sp.style.display = 'block';
  }
}

function goHome() {
  // Reset all overlay/floating elements first
  document.getElementById('tooltip').style.display = 'none';
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('main-content').classList.remove('sidebar-open');
  document.getElementById('profile-panel').classList.remove('open');
  document.getElementById('no-muni-bar').style.display = 'none';
  document.getElementById('nav-breadcrumb').style.display = 'none';
  document.getElementById('nav-back-btn').style.display = 'none';
  currentSP = null;
  // Switch page
  showPage('home');
}

function openSpecialty(id, langSwitch) {
  try {
  const sp = SPECIALTIES.find(s=>s.id===id);
  if (!sp || !sp.available) { console.warn('openSpecialty: not found or unavailable:', id); return; }

  currentSP = sp;
  if (!langSwitch) currentSubFilter = '__all__';

  // Helper: resolve bilingual string or fall back
  const getStr = (v) => !v ? '' : (typeof v==='object' ? (v[LANG]||v.en||'') : v);

  // Nav
  const nameStr = typeof sp.name==='object' ? (sp.name[LANG]||sp.name.en) : sp.name;
  document.getElementById('nav-crumb-label').textContent = nameStr;
  document.getElementById('nav-breadcrumb').style.display = 'flex';
  document.getElementById('nav-back-btn').style.display = 'flex';
  document.getElementById('nav-back-btn').textContent = t('navBack');

  // Page header
  document.getElementById('spec-page-title').innerHTML = sp.pageTitle ? getStr(sp.pageTitle) : t('dermPageTitle');
  document.getElementById('spec-page-desc').textContent = sp.pageDesc ? getStr(sp.pageDesc) : t('dermPageDesc');
  document.getElementById('map-card-title').textContent = t('mapTitle');
  document.getElementById('map-hint').textContent = t('mapHint');
  document.getElementById('tt-hint').textContent = t('ttClickHint');

  // Stats bar
  const rawStats = sp.stats || null;
  const statsArr = rawStats
    ? (Array.isArray(rawStats) ? rawStats : (rawStats[LANG] || rawStats.en || []))
    : [{value:'89',label:t('dermStat0')},{value:'18',label:t('dermStat1')},{value:'60',label:t('dermStat2')},{value:'2.7',label:t('dermStat3')}];
  document.getElementById('spec-stats-bar').innerHTML = statsArr.map(s=>
    '<div class="stat"><div class="stat-value">'+(s.value||s.v||'')+'</div><div class="stat-label">'+(s.label||t(s.k)||'')+'</div></div>'
  ).join('');

  // Loading text
  document.getElementById('loading').style.display = '';
  document.getElementById('loading').textContent = t('loading');

  // Sub-filter chips
  buildSubFilterBar(sp);

  // Switch views
  showPage('specialty');

  // Render map and no-muni bar
  renderMap();
  updateNoMuniBar();
  } catch(err) { console.error('openSpecialty error:', err); }
}

function buildSubFilterBar(sp) {
  const bar = document.getElementById('sub-filter-bar');
  // keep the label span, rebuild chips
  bar.innerHTML = '<span class="sub-filter-label">'+t('filterLabel')+'</span>';

  const spData = SPECIALTY_DATA[sp.id];
  let hasShared = false;

  const allChip = document.createElement('button');
  allChip.className = 'sub-chip all-chip'+(currentSubFilter==='__all__'?' active':'');
  allChip.dataset.sub = '__all__';
  allChip.innerHTML = '<span class="chip-dot"></span> '+t('allChip');
  allChip.onclick = ()=>setSubFilter('__all__');
  bar.appendChild(allChip);

  (sp.subs||[]).forEach(subName => {
    const isShared = !!SHARED_SUBS[subName];
    if (isShared) hasShared = true;
    const hasData = spData && spData.subs && spData.subs[subName] &&
                    Object.keys(spData.subs[subName].counts||{}).length>0;
    const chip = document.createElement('button');
    chip.className = 'sub-chip'+(isShared?' shared-sub':'')+(currentSubFilter===subName?' active':'');
    chip.dataset.sub = subName;
    chip.disabled = !hasData;
    chip.style.opacity = hasData?'1':'0.45';
    chip.title = isShared
      ? (LANG==='en'?'Also under: ':'También en: ')+SHARED_SUBS[subName].filter(p=>p!==currentSP.id).join(', ')
      : '';
    chip.innerHTML = '<span class="chip-dot"></span> '+subName+(isShared?'<span class="shared-badge">↔</span>':'');
    chip.onclick = ()=>{ if(hasData) setSubFilter(subName); };
    bar.appendChild(chip);
  });

  document.getElementById('shared-note').style.display = hasShared ? 'flex' : 'none';
  document.getElementById('shared-note-text').textContent = t('sharedNote');
}

function setSubFilter(subName) {
  currentSubFilter = subName;
  document.querySelectorAll('#sub-filter-bar .sub-chip').forEach(chip=>{
    chip.classList.toggle('active', chip.dataset.sub===subName);
  });
  refreshMapColors();
  renderLegend();
  updateNoMuniBar();
  updateStatsBar();
  closeSidebar();
}

function updateStatsBar() {
  if (!currentSP) return;
  const counts   = getActiveCounts();                      // {muni: n}
  const noMuni   = getNoMuniDocs();                        // docs without municipality
  const muniList = Object.keys(counts);
  const muniWith = muniList.length;
  const muniWithout = 78 - muniWith;

  // Unique providers: sum all docs across municipalities + no-muni list
  const seen = new Set();
  muniList.forEach(muni => {
    const spData = SPECIALTY_DATA[currentSP.id];
    const subsToCheck = currentSubFilter === '__all__'
      ? Object.keys(spData.subs)
      : [currentSubFilter];
    subsToCheck.forEach(sub => {
      const subData = spData.subs[sub];
      if (subData && subData.doctors && subData.doctors[muni]) {
        subData.doctors[muni].forEach(d => seen.add(d.name));
      }
    });
  });
  noMuni.forEach(d => seen.add(d.name));
  const uniqueProviders = seen.size;
  const noMuniCount = noMuni.length;

  // Label helpers
  const sp = currentSP;
  const isAll = currentSubFilter === '__all__';
  const subLabel = isAll ? '' : ` — ${currentSubFilter}`;

  const getS = (o) => typeof o === 'object' ? (o[LANG] || o.en || '') : (o || '');

  // Rebuild stats bar with live values
  const statsEl = document.getElementById('spec-stats-bar');
  if (!statsEl) return;

  // Determine label strings — use specialty's stat labels as templates if available
  const rawStats = sp.stats ? (Array.isArray(sp.stats) ? sp.stats : (sp.stats[LANG] || sp.stats.en || [])) : null;
  const lbl0 = rawStats && rawStats[0] ? (rawStats[0].label || rawStats[0].k) : (LANG==='en' ? 'Unique Specialists' : 'Especialistas únicos');
  const lbl1 = rawStats && rawStats[1] ? (rawStats[1].label || rawStats[1].k) : (LANG==='en' ? 'Municipalities with Coverage' : 'Municipios con cobertura');
  const lbl2 = rawStats && rawStats[2] ? (rawStats[2].label || rawStats[2].k) : (LANG==='en' ? 'Without Coverage' : 'Sin cobertura');
  const lbl3 = rawStats && rawStats[3] ? (rawStats[3].label || rawStats[3].k) : (LANG==='en' ? 'No Municipality Listed' : 'Sin municipio listado');

  statsEl.innerHTML =
    `<div class="stat"><div class="stat-value">${uniqueProviders}</div><div class="stat-label">${lbl0}</div></div>` +
    `<div class="stat"><div class="stat-value">${muniWith}</div><div class="stat-label">${lbl1}</div></div>` +
    `<div class="stat"><div class="stat-value">${muniWithout}</div><div class="stat-label">${lbl2}</div></div>` +
    `<div class="stat"><div class="stat-value">${noMuniCount}</div><div class="stat-label">${lbl3}</div></div>`;
}

// ── No-municipality bar ──────────────────────────────────────────────────────
function getNoMuniDocs() {
  if (!currentSP) return [];
  const spData = SPECIALTY_DATA[currentSP.id];
  if (!spData) return [];
  const seen = new Set(); const docs = [];
  const subsToCheck = currentSubFilter === '__all__'
    ? Object.keys(spData.subs)
    : [currentSubFilter];
  subsToCheck.forEach(subName => {
    const sub = spData.subs[subName];
    if (sub && sub.no_muni) {
      sub.no_muni.forEach(d => {
        if (!seen.has(d.name)) { seen.add(d.name); docs.push(d); }
      });
    }
  });
  return docs;
}

function updateNoMuniBar() {
  const docs = getNoMuniDocs();
  const bar = document.getElementById('no-muni-bar');
  const btn = document.getElementById('no-muni-btn-label');
  if (docs.length > 0) {
    bar.style.display = 'flex';
    btn.textContent = t('noMuniBtn').replace('*','').trim().replace('providers',docs.length+' providers').replace('proveedores',docs.length+' proveedores');
  } else {
    bar.style.display = 'none';
  }
}

function openNoMuniSidebar() {
  const docs = getNoMuniDocs();
  if (!docs.length) return;
  const sp = currentSP;
  const lblP = typeof sp.sidebarLabelPlural==='object'
    ? (sp.sidebarLabelPlural[LANG]||sp.sidebarLabelPlural.en)
    : (sp.sidebarLabelPlural||t('specialists'));
  document.getElementById('sb-title').textContent = t('noMuniSbTitle');
  document.getElementById('sb-subtitle').textContent = docs.length + ' ' + lblP + ' · ' + t('noMuniSbSub');
  document.getElementById('doc-list').innerHTML = docs.map((doc,i) => {
    const safeN = '__no_muni__';
    return '<li class="doc-item" onclick="openNoMuniProfile('+i+')">' +
      '<span class="doc-name">'+doc.name+'</span>' +
      '<span class="doc-arrow">&#8250;</span></li>';
  }).join('');
  document.getElementById('profile-panel').classList.remove('open');
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('main-content').classList.add('sidebar-open');
  window._noMuniDocs = docs;
}

function openNoMuniProfile(idx) {
  const docs = window._noMuniDocs || [];
  const doc = docs[idx];
  if (!doc) return;
  const ini = doc.name.replace(/^(Dr\.|Dra\.)\s*/i,'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase();
  const sp = currentSP;

  document.getElementById('prof-body').innerHTML =
    '<div class="prof-avatar">'+ini+'</div>' +
    '<div class="prof-name">'+doc.name+'</div>' +
    '<div class="prof-tag">'+profTag+'</div>' +
    '<div class="prof-section-label">'+(LANG==='en'?'Municipality':'Municipio')+'</div>' +
    '<div style="font-size:13px;color:var(--muted);padding:4px 0;">'+(LANG==='en'?'Not on record':'No registrado')+'</div>' +
    '<div class="prof-links"><div class="prof-no-links">'+t('profNoLinks')+'</div></div>';
  document.getElementById('profile-panel').classList.add('open');
}

// ════════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════════
function norm(s){return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim()}
function fmtPop(n){return n>=1000?(n/1000).toFixed(0)+'k':String(n)}
function fmtPopFull(n){return n.toLocaleString('en-US')}
function initials(name){return name.replace(/^(Dr\.|Dra\.)\s*/i,'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()}
function cleanUrl(u){return u.replace(/^https?:\/\//,'').replace(/\/.*$/,'')}
function findByNorm(obj,n){const keys=Object.keys(obj);for(let i=0;i<keys.length;i++){if(norm(keys[i])===n)return[keys[i],obj[keys[i]]]}return null}

function buildAllCounts(spData){
  const merged={};
  Object.values(spData.subs).forEach(sub=>{
    Object.entries(sub.counts||{}).forEach(([muni,n])=>{merged[muni]=(merged[muni]||0)+n;});
  });
  return merged;
}

function getActiveCounts(){
  if(!currentSP)return{};
  const spData=SPECIALTY_DATA[currentSP.id];
  if(!spData)return{};
  if(currentSubFilter==='__all__')return buildAllCounts(spData);
  const sub=spData.subs[currentSubFilter];
  return sub?sub.counts:{};
}

function getActiveDoctors(muni){
  if(!currentSP)return[];
  const spData=SPECIALTY_DATA[currentSP.id];
  if(!spData)return[];
  if(currentSubFilter==='__all__'){
    const seen=new Set(),docs=[];
    Object.values(spData.subs).forEach(sub=>{
      (sub.doctors[muni]||[]).forEach(d=>{if(!seen.has(d.name)){seen.add(d.name);docs.push(d);}});
    });
    return docs;
  }
  const sub=spData.subs[currentSubFilter];
  return sub?(sub.doctors[muni]||[]):[];
}

// ════════════════════════════════════════════════════════════════
//  MAP
// ════════════════════════════════════════════════════════════════
const blues=['#E6F1FB','#B5D4F4','#85B7EB','#4d9ed9','#185FA5','#06112E'];
const noDataColor='#d4e4f0';
const strokeColor='rgba(255,255,255,1)';

// Per-specialty thresholds — must match legendDefs in SPECIALTIES array
const SPECIALTY_THRESHOLDS = {
  'dermatology': [2, 4, 8, 15, 29],
  'rheumatology': [2, 4, 8, 16, 31],
  'pm-r': [3, 6, 14, 32, 76],
};
const DEFAULT_THRESHOLDS = [2, 4, 8, 15, 29];

function getColorScale() {
  const thresholds = (currentSP && SPECIALTY_THRESHOLDS[currentSP.id]) || DEFAULT_THRESHOLDS;
  return d3.scaleThreshold().domain(thresholds).range(blues);
}
function getColor(c) {
  if (!c || c === 0) return noDataColor;
  return getColorScale()(c);
}
function fitFont(t2,w,h,mx,mn){return Math.max(mn,Math.min(mx,w/(t2.length*.58),h*.85))}

const W=1600,H=820;
const svgEl=d3.select('#pr-map');
const proj=d3.geoMercator().center([-66.45,18.225]).scale(21000).translate([W/2,H/2]);
const pathFn=d3.geoPath(proj);
const tooltip=document.getElementById('tooltip');
const GEO_URL='https://cdn.jsdelivr.net/gh/commonwealth-of-puerto-rico/crime-spotter@master/public/data/municipalities.geojson';
let labelTexts=[];

function renderMap(){
  // Show loading, hide SVG — works for both first load and re-entry
  document.getElementById('loading').style.display='';
  svgEl.style('display','none');
  if(window._geoCache){
    _buildMap(window._geoCache);
  } else {
    d3.json(GEO_URL).then(geo=>{
      window._geoCache=geo;
      _buildMap(geo);
    }).catch(()=>{
      document.getElementById('loading').textContent=t('loadError');
    });
  }
}

function _buildMap(geo){
  document.getElementById('loading').style.display='none';
  svgEl.selectAll('*').remove();
  svgEl.style('display','block');
  mapLoaded=true;
  const g=svgEl.append('g');
    mapPathsSel=g.selectAll('path').data(geo.features).join('path')
      .attr('d',pathFn)
      .attr('stroke',strokeColor).attr('stroke-width',1)
      .attr('fill',d=>{
        const n=norm(d.properties.name||d.properties.NAME||'');
        const e=findByNorm(getActiveCounts(),n);
        return getColor(e?e[1]:0);
      })
      .style('cursor','pointer')
      .on('mousemove',function(event,d){
        const raw=d.properties.name||d.properties.NAME||'';
        const n=norm(raw);
        const counts=getActiveCounts();
        const e=findByNorm(counts,n);
        const p=findByNorm(popData,n);
        const cnt=e?e[1]:0;
        const popV=p?p[1]:null;
        const per=(popV&&cnt>0)?((cnt/popV)*100000).toFixed(1):'0.0';
        const safeX=Math.min(event.clientX+18,window.innerWidth-220);
        const safeY=Math.max(event.clientY-60,8);
        tooltip.style.cssText='display:block;left:'+safeX+'px;top:'+safeY+'px';
        document.getElementById('tt-name').textContent=e?e[0]:raw;
        const subLabel=currentSubFilter==='__all__'?t('ttSpecialists'):currentSubFilter;
        document.getElementById('tt-grid').innerHTML=
          '<span class="tt-key">'+t('ttPopulation')+'</span><span class="tt-val">'+(popV?fmtPopFull(popV):'N/A')+'</span>'+
          '<span class="tt-key">'+subLabel+'</span><span class="tt-val">'+cnt+'</span>'+
          '<span class="tt-key">'+t('ttPer100k')+'</span><span class="tt-val">'+per+'</span>';
        document.getElementById('tt-hint').textContent=t('ttClickHint');
        d3.select(this).attr('stroke','#06112E').attr('stroke-width',2.5);
      })
      .on('mouseleave',function(){
        tooltip.style.display='none';
        d3.select(this).attr('stroke',strokeColor).attr('stroke-width',1);
      })
      .on('click',function(event,d){
        tooltip.style.display='none';
        const n=norm(d.properties.name||d.properties.NAME||'');
        const e=findByNorm(getActiveCounts(),n);
        if(e)openSidebar(e[0]);
      });
  drawLabels(geo,mapPathsSel.nodes());
  renderLegend();
}

function drawLabels(geo,nodes){
  labelTexts.forEach(n=>n.remove());
  labelTexts=[];
  const counts=getActiveCounts();
  geo.features.forEach((d,i)=>{
    const n=norm(d.properties.name||d.properties.NAME||'');
    const e=findByNorm(counts,n);
    const p=findByNorm(popData,n);
    const centroid=pathFn.centroid(d);
    const cx=centroid[0],cy=centroid[1];
    if(isNaN(cx)||isNaN(cy))return;
    const has=e&&e[1]>0;
    const cnt=has?e[1]:0;
    const bb=nodes[i].getBBox();
    const aw=bb.width*.72,ah=bb.height*.72;
    const cl=String(cnt);
    const pl=p?(has?'('+fmtPop(p[1])+')':fmtPop(p[1])):'';
    const cs=has?fitFont(cl,aw,ah*.48,18,6):0;
    const ps=p?fitFont(pl,aw,has?ah*.38:ah*.7,13,5.5):0;
    const MIN=5.5;
    const tf=has?(cnt>=5?'#fff':'#042C53'):'#3a6080';
    const gap=has?Math.max(cs*.3,3):0;
    const tot=has?cs+gap+ps:ps;
    const sy=cy-tot/2+cs*.85;
    if(has&&cs>=MIN){
      const tx=svgEl.append('text').attr('x',cx).attr('y',sy)
        .attr('text-anchor','middle').attr('font-size',cs+'px')
        .attr('font-weight','700').attr('font-family','DM Sans,sans-serif')
        .attr('fill',tf).attr('pointer-events','none').text(cl);
      labelTexts.push(tx.node());
    }
    if(p&&ps>=MIN){
      const yp=has?sy+cs*.25+gap+ps:cy+ps*.35;
      const tx=svgEl.append('text').attr('x',cx).attr('y',yp)
        .attr('text-anchor','middle').attr('font-size',ps+'px')
        .attr('font-weight','400').attr('font-family','DM Sans,sans-serif')
        .attr('fill',tf).attr('opacity',.9).attr('pointer-events','none').text(pl);
      labelTexts.push(tx.node());
    }
  });
}

function refreshMapColors(){
  if(!mapPathsSel||!currentSP)return;
  const counts=getActiveCounts();
  mapPathsSel.attr('fill',d=>{
    const n=norm(d.properties.name||d.properties.NAME||'');
    const e=findByNorm(counts,n);
    return getColor(e?e[1]:0);
  });
  if(window._geoCache){
    drawLabels(window._geoCache,mapPathsSel.nodes());
  }
}

function renderLegend(){
  const sp=currentSP;
  const lang=LANG;
  const defLabel=(item)=>typeof item.l==='object'?(item.l[lang]||item.l.en):item.l;
  const defs=(sp&&sp.legendDefs)||[
    {l:{en:'No data',es:'Sin datos'},c:noDataColor},{l:'1',c:blues[0]},{l:'2–3',c:blues[1]},
    {l:'4–7',c:blues[2]},{l:'8–14',c:blues[3]},{l:'15–28',c:blues[4]},
    {l:'29+',c:blues[5]}
  ];
  const labelText = currentSubFilter==='__all__'
    ? t('legendLabel')
    : currentSubFilter+':';
  const le=document.getElementById('legend');
  le.innerHTML='<span class="legend-label">'+labelText+'</span>';
  defs.forEach(item=>{
    le.innerHTML+='<span class="legend-item"><span class="legend-swatch" style="background:'+item.c+'"></span><span>'+defLabel(item)+'</span></span>';
  });
}

function openSidebar(muni){
  const docs=getActiveDoctors(muni);
  const counts=getActiveCounts();
  const cnt=(findByNorm(counts,norm(muni))||[null,0])[1];
  const p=findByNorm(popData,norm(muni));
  const per=(p&&cnt>0)?((cnt/p[1])*100000).toFixed(1):'0.0';
  const spLbl  = currentSP.sidebarLabel;
  const spLblP = currentSP.sidebarLabelPlural;
  const lbl  = spLbl  ? (typeof spLbl==='object'  ?(spLbl[LANG]||spLbl.en)   :spLbl)  : t('dermLabel');
  const lblP = spLblP ? (typeof spLblP==='object' ?(spLblP[LANG]||spLblP.en) :spLblP) : t('dermLabelP');
  const subLbl= currentSubFilter==='__all__'?'':'  ·  '+currentSubFilter;
  document.getElementById('sb-title').textContent=muni;
  document.getElementById('sb-subtitle').textContent=cnt+' '+(cnt!==1?lblP:lbl)+' · '+per+' '+t('perCapita')+subLbl;
  document.getElementById('doc-list').innerHTML=docs.map((doc,i)=>{
    const multi=doc.municipalities.length>1;
    const safeM=muni.replace(/'/g,"\\'");
    return '<li class="doc-item" onclick="openProfile('+i+',\''+safeM+'\')">'+
      '<span class="doc-name">'+doc.name+'</span>'+
      (multi?'<span class="doc-multi">'+doc.municipalities.length+' '+t('municipios')+'</span>':'')+
      '<span class="doc-arrow">&#8250;</span></li>';
  }).join('');
  if(!docs.length) document.getElementById('doc-list').innerHTML='<li style="padding:1.5rem;font-size:13px;color:var(--muted)">'+t('noData')+'</li>';
  document.getElementById('profile-panel').classList.remove('open');
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('main-content').classList.add('sidebar-open');
  window._sidebarDocs=docs;
  window._sidebarMuni=muni;
}

function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('main-content').classList.remove('sidebar-open');
  setTimeout(()=>document.getElementById('profile-panel').classList.remove('open'),350);
}

function openProfile(idx,muni){
  const docs=window._sidebarDocs||getActiveDoctors(muni);
  const doc=docs[idx];
  if(!doc)return;
  const ini=initials(doc.name);
  const isMulti=doc.municipalities.length>1;
  const ws=doc.website,so=doc.social,ig=doc.instagram;
  const hasIG=so&&so.indexOf('instagram.com')!==-1;
  const hasFB=(so&&so.indexOf('facebook.com')!==-1)||(ig&&typeof ig==='string'&&ig.indexOf('facebook.com')!==-1);
  const fbUrl=(so&&so.indexOf('facebook.com')!==-1)?so:((ig&&typeof ig==='string'&&ig.indexOf('facebook.com')!==-1)?ig:null);
  const igHandle=(ig&&typeof ig==='string'&&ig.charAt(0)==='@')?ig:null;
  const links=[];
  if(ws)links.push('<a class="prof-link" href="'+ws+'" target="_blank" rel="noopener"><span class="prof-link-icon">&#127760;</span><div class="prof-link-text"><span class="prof-link-label">'+(isMulti?t('profWebsiteAt')+' '+muni:t('profWebsite'))+'</span><span class="prof-link-val">'+cleanUrl(ws)+'</span></div><span class="prof-ext">&#8599;</span></a>');
  if(hasIG)links.push('<a class="prof-link" href="'+so+'" target="_blank" rel="noopener"><span class="prof-link-icon">&#128247;</span><div class="prof-link-text"><span class="prof-link-label">Instagram</span><span class="prof-link-val">'+(igHandle||cleanUrl(so))+'</span></div><span class="prof-ext">&#8599;</span></a>');
  if(hasFB)links.push('<a class="prof-link" href="'+fbUrl+'" target="_blank" rel="noopener"><span class="prof-link-icon">&#128101;</span><div class="prof-link-text"><span class="prof-link-label">Facebook</span><span class="prof-link-val">Ver perfil</span></div><span class="prof-ext">&#8599;</span></a>');
  const muniTags=doc.municipalities.map(m=>'<span class="prof-muni-tag'+(m===muni?' current':'')+'">'+m+'</span>').join('');
  const officeNote=isMulti?'<div class="prof-office-note">'+(LANG==='en'?'Showing links for office in ':'Mostrando enlaces para la oficina en ')+'<strong>'+muni+'</strong></div>':'';
  document.getElementById('prof-body').innerHTML=
    '<div class="prof-avatar">'+ini+'</div>'+
    '<div class="prof-name">'+doc.name+'</div>'+
    '<div class="prof-tag">'+(typeof currentSP.profTag==='object'?(currentSP.profTag[LANG]||currentSP.profTag.en):t('dermTag'))+'</div>'+
    '<div class="prof-section-label">'+t('profPractices')+'</div>'+
    '<div class="prof-munis">'+muniTags+'</div>'+
    officeNote+
    '<div class="prof-section-label">'+(isMulti?t('profContactAt')+' '+muni:t('profContact'))+'</div>'+
    '<div class="prof-links">'+(links.length?links.join(''):'<div class="prof-no-links">'+t('profNoLinks')+'</div>')+'</div>';
  document.getElementById('profile-panel').classList.add('open');
}

function closeProfile(){document.getElementById('profile-panel').classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSidebar()});
